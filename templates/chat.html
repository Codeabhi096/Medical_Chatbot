<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MediBot — Medical Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="app-wrapper">

    <div class="header">
        <div class="header-icon">
            <svg viewBox="0 0 24 24" fill="white" width="22" height="22">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 
                2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-4H6v-2h4V7h2v4h4v2h-4v4z"/>
            </svg>
        </div>
        <div>
            <div class="header-title">MediBot</div>
            <div class="header-sub">Medical Assistant &mdash; Online</div>
        </div>
    </div>

    <div class="chat-area" id="chat-area">
        <div class="bot-row">
            <div class="avatar">
                <svg viewBox="0 0 24 24" fill="#0F6E56" width="15" height="15">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 
                    2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-4H6v-2h4V7h2v4h4v2h-4v4z"/>
                </svg>
            </div>
            <div class="msg bot-msg">
                Namaste! Main <strong>MediBot</strong> hoon. Apne medical sawaal poochh sakte hain. 
                Main apni full koshish karunga aapki madad karne ki. 🩺
            </div>
        </div>
    </div>

    <div class="input-area">
        <input 
            type="text" 
            id="user-input" 
            placeholder="Apna sawaal yahan likho..." 
            autocomplete="off"
        />
        <button id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="white" width="18" height="18">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>

</div>

<script>
    const chatArea = document.getElementById('chat-area');
    const userInput = document.getElementById('user-input');

    userInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    function appendMessage(text, type) {
        if (type === 'user') {
            const div = document.createElement('div');
            div.className = 'msg user-msg';
            div.textContent = text;
            chatArea.appendChild(div);
        } else if (type === 'bot') {
            const row = document.createElement('div');
            row.className = 'bot-row';
            row.innerHTML = `
                <div class="avatar">
                    <svg viewBox="0 0 24 24" fill="#0F6E56" width="15" height="15">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 
                        2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-4H6v-2h4V7h2v4h4v2h-4v4z"/>
                    </svg>
                </div>
                <div class="msg bot-msg">${text}</div>
            `;
            chatArea.appendChild(row);
        } else if (type === 'typing') {
            const row = document.createElement('div');
            row.className = 'bot-row';
            row.id = 'typing-indicator';
            row.innerHTML = `
                <div class="avatar">
                    <svg viewBox="0 0 24 24" fill="#0F6E56" width="15" height="15">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 
                        2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-4H6v-2h4V7h2v4h4v2h-4v4z"/>
                    </svg>
                </div>
                <div class="msg bot-msg typing">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatArea.appendChild(row);
        }
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function sendMessage() {
        const msg = userInput.value.trim();
        if (!msg) return;

        appendMessage(msg, 'user');
        userInput.value = '';
        userInput.disabled = true;
        document.getElementById('send-btn').disabled = true;

        appendMessage('', 'typing');

        try {
            const formData = new FormData();
            formData.append('msg', msg);

            const res = await fetch('/get', { method: 'POST', body: formData });
            const answer = await res.text();

            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();

            appendMessage(answer, 'bot');
        } catch (err) {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
            appendMessage('Sorry, kuch error aa gaya. Please dobara try karo.', 'bot');
        }

        userInput.disabled = false;
        document.getElementById('send-btn').disabled = false;
        userInput.focus();
    }
</script>

</body>
</html>
